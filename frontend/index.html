<!DOCTYPE html>
<html>
<head>
    <title>What Not to Learn</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #eef1f5, #dfe6f0);
            margin: 0;
            padding: 0;
        }

        .box {
            width: 420px;
            margin: 100px auto;
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 6px 18px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            color: #666;
            font-size: 14px;
        }

        input {
            width: 85%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #4a63e7;
        }

        button {
            margin-top: 15px;
            padding: 10px 18px;
            border: none;
            background-color: #4a63e7;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #3a4fd1;
        }

        .result {
            margin-top: 20px;
            text-align: left;
            font-size: 15px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }

        .avoidBox {
            background-color: #ffe6e6;
            border-left: 5px solid red;
        }

        .goodBox {
            background-color: #e6ffe6;
            border-left: 5px solid green;
        }

        .loading {
            text-align: center;
            font-style: italic;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>What Not to Learn</h1>
        <p>Check if a skill is worth learning</p>

        <input type="text" id="skillInput" placeholder="Enter a skill (e.g. PHP)" autofocus>
        <br>

        <button onclick="analyze()">Analyze</button>

        <div class="result" id="resultBox"></div>
    </div>

    <script>
        const skillInput = document.getElementById("skillInput");

        // Enter key support
        skillInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                analyze();
            }
        });

        async function analyze() {
            let skill = skillInput.value.trim();
            let resultBox = document.getElementById("resultBox");

            if (skill === "") {
                resultBox.style.display = "block";
                resultBox.innerHTML = "⚠️ Please enter a skill";
                return;
            }

            resultBox.style.display = "block";
            resultBox.className = "result loading";
            resultBox.innerHTML = "⏳ Analyzing...";

            try {
                const response = await fetch("http://127.0.0.1:5000/analyze", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ skill: skill })
                });

                const data = await response.json();

                if (data.error) {
                    resultBox.innerHTML = "❌ " + data.error;
                    return;
                }

                let isAvoid = data.decision.includes("Avoid");
                resultBox.className = "result " + (isAvoid ? "avoidBox" : "goodBox");

                resultBox.innerHTML = `
                    <h3>${data.decision}</h3>
                    <p><b>Skill:</b> ${data.skill}</p>
                    
                    <p><b>🧠 AI Insight:</b><br>
                    ${data.reason}</p>

                    <p><b>🔄 Better Alternative:</b><br>
                    ${data.alternative}</p>

                    <p><b>📊 Score:</b> ${data.score}</p>
                `;

            } catch (error) {
                resultBox.innerHTML = "❌ Error connecting to backend";
            }
        }
    </script>

</body>
</html>
